<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Ten.net TODO App</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        display: flex;
        justify-content: center;
        padding: 2rem;
      }
      main {
        width: min(100%, 42rem);
        background: white;
        border-radius: 1rem;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
        padding: 2rem;
      }
      h1 {
        margin: 0 0 1rem;
        font-size: 2rem;
      }
      .todo-form {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .todo-form input {
        flex: 1 1 16rem;
        min-width: 0;
        padding: 0.9rem 1rem;
        border: 1px solid #cbd5e1;
        border-radius: 0.75rem;
        font-size: 1rem;
      }
      .todo-form button {
        padding: 0.9rem 1.25rem;
        border: none;
        border-radius: 0.75rem;
        background: #2563eb;
        color: white;
        cursor: pointer;
        font-weight: 600;
      }
      .todo-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 0.75rem;
      }
      .todo-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1rem 1rem;
        border-radius: 0.9rem;
        border: 1px solid #e2e8f0;
        background: #f8fafc;
      }
      .todo-item strong {
        display: block;
        margin: 0;
      }
      .todo-item .actions {
        display: flex;
        gap: 0.5rem;
      }
      .todo-item button {
        border: 1px solid #cbd5e1;
        border-radius: 0.75rem;
        background: white;
        color: #0f172a;
        padding: 0.65rem 0.9rem;
        cursor: pointer;
      }
      .todo-item button.primary {
        background: #2563eb;
        color: white;
        border-color: #2563eb;
      }
      .todo-item .done {
        text-decoration: line-through;
        color: #64748b;
      }
      .footer {
        margin-top: 1.5rem;
        color: #475569;
        font-size: 0.95rem;
      }
      .empty {
        margin: 0;
        padding: 1.5rem;
        border-radius: 0.9rem;
        background: #f1f5f9;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>TODO App</h1>
      <form class="todo-form" method="post" action="/add">
        <input name="text" type="text" placeholder="Add a new task" required />
        <button type="submit">Add task</button>
      </form>

      <section>
        <h2>Tasks</h2>
        <ul class="todo-list">{{{todo_items}}}</ul>
        <p class="footer">{{done_count}} of {{count}} tasks completed</p>
      </section>
    </main>
  </body>
</html>
