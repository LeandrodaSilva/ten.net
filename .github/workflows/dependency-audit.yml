name: Dependency Audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  npm-audit:
    name: Audit npm dependencies from deno.json
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run npm audit against Deno npm imports
        run: node scripts/npmAudit.mjs
