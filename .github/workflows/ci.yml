name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run formatter
        run: deno fmt

      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "style: auto-format [skip ci]"
          git push

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: format
    if: always() && (needs.format.result == 'success' || needs.format.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run linter
        run: deno lint --unstable-raw-imports

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache dependencies
        run: deno cache --unstable-raw-imports src/mod.ts

      - name: Run tests with coverage
        run: deno test --allow-all --unstable-raw-imports --unstable-kv --coverage=coverage

      - name: Generate coverage report
        run: deno coverage coverage --lcov --output=coverage/lcov.info

      - name: Check coverage threshold (90%)
        run: |
          LINE_COV=$(deno coverage coverage 2>&1 | grep "All files" | awk '{print $NF}' | tr -d '%')
          echo "Line coverage: ${LINE_COV}%"
          if [ "$(echo "$LINE_COV" | awk '{print ($1 < 90)}')" -eq 1 ]; then
            echo "::error::Line coverage ${LINE_COV}% is below 90% threshold"
            exit 1
          fi
          echo "Coverage check passed"

      - name: Type check
        run: deno check **/*.ts --unstable-raw-imports

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run benchmarks and update history
        run: deno task bench

      - name: Check for regressions
        run: deno task bench:check

      - name: Commit benchmark results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks/history.json README.md
          git diff --staged --quiet || git commit -m "ci: update benchmark results [skip ci]"
          git push
