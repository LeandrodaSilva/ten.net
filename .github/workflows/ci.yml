name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Verify formatting
        run: deno fmt --check

      - name: Run linter
        run: deno lint --unstable-raw-imports

      - name: Cache dependencies and warm up bundler
        run: |
          deno cache --unstable-raw-imports --unstable-bundle src/mod.ts
          deno eval --unstable-bundle 'await Deno.bundle({ entrypoints: ["./app/api/hello/route.ts"], platform: "deno", minify: false, write: false }); console.log("Bundler warmed up")'

      - name: Run tests with coverage
        run: deno test --allow-all --unstable-raw-imports --unstable-bundle --coverage=coverage

      - name: Generate coverage report
        run: deno coverage coverage --lcov --output=coverage/lcov.info

      - name: Check coverage threshold (90%)
        run: |
          LINE_COV=$(deno coverage coverage 2>&1 | grep "All files" | awk '{print $NF}' | tr -d '%')
          echo "Line coverage: ${LINE_COV}%"
          if [ "$(echo "$LINE_COV" | awk '{print ($1 < 90)}')" -eq 1 ]; then
            echo "::error::Line coverage ${LINE_COV}% is below 90% threshold"
            exit 1
          fi
          echo "Coverage check passed"

      - name: Type check
        run: deno check **/*.ts --unstable-raw-imports

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run benchmarks and update history
        run: deno task bench

      - name: Check for regressions
        run: deno task bench:check

      - name: Commit benchmark results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks/history.json README.md
          git diff --staged --quiet || git commit -m "ci: update benchmark results [skip ci]"
          git push
