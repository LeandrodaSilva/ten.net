name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Verify formatting
        run: deno fmt --check

      - name: Run linter
        run: deno lint --unstable-raw-imports

      - name: Run tests with coverage
        run: deno test --allow-all --unstable-raw-imports --unstable-bundle --coverage=coverage

      - name: Generate coverage report
        run: deno coverage coverage --lcov --output=coverage/lcov.info

      - name: Check coverage threshold (90%)
        run: |
          LINE_COV=$(deno coverage coverage 2>&1 | grep "All files" | awk '{print $NF}' | tr -d '%')
          echo "Line coverage: ${LINE_COV}%"
          if [ "$(echo "$LINE_COV" | awk '{print ($1 < 90)}')" -eq 1 ]; then
            echo "::error::Line coverage ${LINE_COV}% is below 90% threshold"
            exit 1
          fi
          echo "Coverage check passed"

      - name: Type check
        run: deno check **/*.ts --unstable-raw-imports
