name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Verify formatting
        run: deno fmt --check

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run linter
        run: deno task lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [fmt, lint]
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache dependencies
        run: deno cache --unstable-raw-imports src/mod.ts

      - name: Run tests with coverage
        run: deno task coverage

      - name: Generate coverage report
        run: deno coverage coverage --lcov --output=coverage/lcov.info

      - name: Check coverage threshold
        # Enforced floor (ratchet). The long-term goal is 90% — see
        # docs/coverage-plan.md for the path there. Raise MIN_COVERAGE as
        # coverage improves; it must never go down.
        env:
          MIN_COVERAGE: "77"
        run: |
          LINE_COV=$(deno coverage coverage 2>&1 \
            | sed -E 's/\x1b\[[0-9;]*m//g' \
            | awk -F'|' '/All files/ { gsub(/[ %]/, "", $(NF-1)); print $(NF-1) }')
          echo "Line coverage: ${LINE_COV}% (floor: ${MIN_COVERAGE}%)"
          if [ -z "$LINE_COV" ]; then
            echo "::error::Could not parse line coverage from deno coverage output"
            exit 1
          fi
          if awk "BEGIN { exit !(${LINE_COV} < ${MIN_COVERAGE}) }"; then
            echo "::error::Line coverage ${LINE_COV}% is below the ${MIN_COVERAGE}% floor"
            exit 1
          fi
          echo "Coverage check passed"

      - name: Type check
        run: deno task check
