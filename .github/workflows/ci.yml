name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Verify formatting
        run: deno fmt --check

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run linter
        run: deno task lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [fmt, lint]
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache dependencies
        run: deno cache --unstable-raw-imports src/mod.ts

      - name: Run tests with coverage
        run: deno task coverage

      - name: Generate coverage report
        run: deno coverage coverage --lcov --output=coverage/lcov.info

      - name: Check coverage threshold (90%)
        run: |
          LINE_COV=$(deno coverage coverage 2>&1 | grep "All files" | awk '{print $NF}' | tr -d '%')
          echo "Line coverage: ${LINE_COV}%"
          if [ "$(echo "$LINE_COV" | awk '{print ($1 < 90)}')" -eq 1 ]; then
            echo "::error::Line coverage ${LINE_COV}% is below 90% threshold"
            exit 1
          fi
          echo "Coverage check passed"

      - name: Type check
        run: deno task check
